appId: com.transcribevideos.app
productName: TranscribeVideos
copyright: "Copyright © 2026 Esteban Cortes"

directories:
  output: dist
  buildResources: assets

asar: true

asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/node_modules/better-sqlite3/**"

extraResources:
  - from: "../server"
    to: "server"
    filter:
      - "**/*"
      - "!uploads/**"
      - "!data/**"
      - "!node_modules/.cache/**"
  - from: "../client/dist"
    to: "client/dist"

files:
  - main.js
  - preload.js
  - package.json
  - node_modules/**/*

mac:
  target:
    - dmg
    - zip
  artifactName: "${name}-${version}-mac.${ext}"
  icon: assets/icon.png
  category: public.app-category.productivity

win:
  target:
    - nsis
  artifactName: "${name}-${version}-win.${ext}"
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
  category: Utility
